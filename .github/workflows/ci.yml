name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: dart analyze
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: dart pub get
      - run: dart analyze

  test:
    name: flutter test (${{ matrix.package }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        package:
          - background_runtime_platform_interface
          - background_runtime
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: dart pub get
      - working-directory: ${{ matrix.package }}
        run: flutter test --coverage
      - uses: codecov/codecov-action@v5
        with:
          directory: ${{ matrix.package }}/coverage
          flags: ${{ matrix.package }}

  swiftpm_ios:
    name: iOS SwiftPM
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - working-directory: background_runtime_ios/ios/background_runtime_ios
        run: swift package resolve

  swiftpm_macos:
    name: macOS SwiftPM
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - working-directory: background_runtime_macos/macos/background_runtime_macos
        run: swift package resolve

  cmake_windows:
    name: Windows CMake
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - working-directory: background_runtime_windows/windows
        run: cmake -B build -S . -G "Visual Studio 17 2022"

  cmake_linux:
    name: Linux CMake
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get update && sudo apt-get install -y \
            cmake libgtk-3-dev pkg-config
      - working-directory: background_runtime_linux/linux
        run: cmake -B build -S .

  android_build:
    name: Android build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - working-directory: example
        run: flutter build apk --debug
