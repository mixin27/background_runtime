name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze:
    name: dart analyze + test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: dart pub get
      - run: dart analyze
      - run: dart test

  swiftpm_ios:
    name: iOS SwiftPM
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - working-directory: background_runtime_ios/ios/background_runtime_ios
        run: swift package resolve

  swiftpm_macos:
    name: macOS SwiftPM
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - working-directory: background_runtime_macos/macos/background_runtime_macos
        run: swift package resolve

  cmake_windows:
    name: Windows CMake
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - working-directory: background_runtime_windows/windows
        run: cmake -B build -S . -G "Visual Studio 17 2022"

  cmake_linux:
    name: Linux CMake
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y cmake libgtk-3-dev pkg-config
      - working-directory: background_runtime_linux/linux
        run: cmake -B build -S .
