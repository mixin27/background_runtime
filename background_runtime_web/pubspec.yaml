name: background_runtime_web
description: Web implementation of the background_runtime plugin.
version: 0.1.0
homepage: https://github.com/mixin27/background_runtime
repository: https://github.com/mixin27/background_runtime

resolution: workspace

environment:
  sdk: ^3.5.0
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  background_runtime_platform_interface: ^0.1.0

flutter:
  plugin:
    implements: background_runtime
    platforms:
      web:
        pluginClass: BackgroundRuntimeWebPlugin
        fileName: background_runtime_web.dart

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
