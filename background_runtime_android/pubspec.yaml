name: background_runtime_android
description: Android implementation of the background_runtime plugin.
version: 0.1.0
publish_to: none
homepage: https://github.com/mixin27/background_runtime
repository: https://github.com/mixin27/background_runtime

resolution: workspace

environment:
  sdk: ^3.11.0
  flutter: ^3.41.0

dependencies:
  flutter:
    sdk: flutter
  background_runtime_platform_interface:
    path: ../background_runtime_platform_interface

flutter:
  plugin:
    platforms:
      android:
        package: dev.mixin27.background_runtime_android
        pluginClass: BackgroundRuntimeAndroidPlugin

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
